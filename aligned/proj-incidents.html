<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><style>
:root{--ink:#16212b;--sub:#475569;--faint:#6b7280;--teal:#0f5c6d;--teal-ink:#0b3642;--cardline:#e2e8ed;--rcard:16px;--rctrl:10px;--tint:#ecf6f6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans TC",system-ui,sans-serif;background:#e3e9ee;color:var(--ink);font-size:14px;line-height:1.5;padding:16px}
.wrap{max-width:920px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.num{font-variant-numeric:tabular-nums}svg{vertical-align:middle}
.back{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--sub);margin:2px 2px}
.hero{border-radius:var(--rcard);padding:18px 22px;color:#fff;background:radial-gradient(circle at 88% 12%,rgba(218,168,72,.24) 0%,rgba(218,168,72,0) 26%),radial-gradient(circle at 12% 0%,rgba(76,201,240,.2) 0%,rgba(76,201,240,0) 30%),linear-gradient(135deg,#061922 0%,#0b3642 48%,#0f5c6d 80%,#041018 100%)}
.hero .eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.6)}
.hero h1{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:600;margin-top:6px}
.hero h1 .warn{color:#fca5a5;flex:0 0 auto}
.hero .desc{margin-top:10px;font-size:13px;color:rgba(255,255,255,.78);line-height:1.7}
.hero .desc .seg{white-space:nowrap}
.hero .desc b{font-weight:700}
.hero .desc .d{color:rgba(255,255,255,.4);margin:0 5px}
.report{display:inline-flex;align-items:center;justify-content:center;gap:7px;align-self:flex-start;background:#dc2626;color:#fff;font-weight:700;font-size:14px;border-radius:var(--rctrl);min-height:44px;padding:0 18px;box-shadow:0 1px 2px rgba(220,38,38,.18),0 8px 20px -12px rgba(220,38,38,.55)}
.report svg{flex:0 0 auto}
.card{background:#fff;border:1px solid var(--cardline);border-radius:var(--rcard);box-shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px -16px rgba(11,54,66,.18);padding:20px 22px}
.empty{display:flex;flex-direction:column;align-items:center;gap:12px;padding:44px 18px;text-align:center}
.empty .ico{width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:14px;background:var(--tint);color:var(--teal);flex:0 0 auto}
.empty .et{font-size:14px;font-weight:500;color:var(--faint)}
@media(max-width:560px){
  body{padding:12px}.wrap{gap:10px}
  .hero{padding:16px}.hero h1{font-size:19px}
  .hero .desc .seg{white-space:normal}
  .report{align-self:stretch;width:100%}
  .empty{padding:36px 14px}
}
</style></head><body><div class="wrap">

  <a class="back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>返回</a>

  <div class="hero">
    <span class="eyebrow">客訴 / 工安事故</span>
    <h1><svg class="warn" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>客訴 / 工安事故</h1>
    <div class="desc"><span class="seg"><b class="num">0</b> 件未結案</span><span class="d">·</span><span class="seg">共 <b class="num">0</b> 筆</span><span class="d">·</span><span class="seg">上報後即時通知 CEO / COO / 董事長 / 店長 / 督導</span></div>
  </div>

  <span class="report"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>上報異常</span>

  <div class="card empty">
    <span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg></span>
    <span class="et">尚無客訴或工安事故紀錄</span>
  </div>

</div></body></html>
