<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><style>
:root{--ink:#16212b;--sub:#475569;--faint:#6b7280;--teal:#0f5c6d;--teal-ink:#0b3642;--cardline:rgba(11,54,66,.15);--rcard:14px;--rctrl:10px;--tint:#ecf6f6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans TC",system-ui,sans-serif;background:#e3e9ee;color:var(--ink);font-size:14px;line-height:1.5;padding:16px}
.wrap{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.num{font-variant-numeric:tabular-nums}svg{vertical-align:middle}
.back{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--sub);margin:2px}
.hero{border-radius:var(--rcard);padding:18px 22px;color:#fff;background:radial-gradient(circle at 88% 12%,rgba(218,168,72,.24) 0%,rgba(218,168,72,0) 26%),radial-gradient(circle at 12% 0%,rgba(76,201,240,.2) 0%,rgba(76,201,240,0) 30%),linear-gradient(135deg,#061922 0%,#0b3642 48%,#0f5c6d 80%,#041018 100%)}
.hero .top{display:flex;align-items:flex-start;gap:12px}
.hero .eyebrow{font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.6)}
.hero h1{font-size:22px;font-weight:600;margin-top:4px}
.hero .titlewrap{margin-right:auto;min-width:0}
.hero .flow{font-size:13px;color:rgba(255,255,255,.78);margin-top:7px}
.hero .add{flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;background:#fff;color:var(--teal-ink);font-weight:700;font-size:13px;border-radius:var(--rctrl);padding:9px 14px;min-height:40px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.scard{background:#fff;border:1px solid #e2e8ed;border-radius:16px;box-shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px -16px rgba(11,54,66,.18);padding:18px 20px}
.scard .k{font-size:12px;color:var(--faint);font-weight:600;letter-spacing:.02em}
.scard .v{font-size:24px;font-weight:700;color:var(--teal-ink);margin-top:5px}
.scard .v.green{color:#0f766e}
.empty{background:#fff;border:1px solid #e2e8ed;border-radius:16px;box-shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px -16px rgba(11,54,66,.18);padding:48px 16px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px}
.empty .ico{color:#94a3b8}
.empty .t1{font-size:15px;font-weight:600;color:var(--sub)}
.empty .t2{font-size:13px;color:var(--faint)}
@media(max-width:560px){
  body{padding:12px}.wrap{gap:10px}
  .hero{padding:16px}.hero .top{flex-wrap:wrap}.hero .titlewrap{margin-right:auto}
  .hero .add{order:9;flex:1 1 100%;justify-content:center;margin-top:10px}
  .stats{grid-template-columns:1fr}
  .empty{padding:36px 14px}
}
</style></head><body><div class="wrap">

  <span class="back"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>返回</span>

  <div class="hero">
    <div class="top">
      <div class="titlewrap">
        <div class="eyebrow">PM 材料管理</div>
        <h1>材料訂單</h1>
        <div class="flow">PM 建單 → 總部審 → 下單 → 出貨 → 到貨確認</div>
      </div>
      <span class="add"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>建立材料訂單</span>
    </div>
  </div>

  <div class="stats">
    <div class="scard"><span class="k">訂單總額</span><div class="v num">$0</div></div>
    <div class="scard"><span class="k">進行中</span><div class="v num">0</div></div>
    <div class="scard"><span class="k">已到貨</span><div class="v num green">0</div></div>
  </div>

  <div class="empty">
    <svg class="ico" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
    <div class="t1">尚無材料訂單</div>
    <div class="t2">點右上「建立材料訂單」開始</div>
  </div>

</div></body></html>
