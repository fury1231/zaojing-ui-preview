<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><style>
:root{--ink:#16212b;--sub:#475569;--faint:#6b7280;--teal:#0f5c6d;--teal-ink:#0b3642;--cardline:rgba(11,54,66,.15);--rcard:14px;--rctrl:10px;--tint:#ecf6f6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans TC",system-ui,sans-serif;background:#e3e9ee;color:var(--ink);font-size:14px;line-height:1.5;padding:16px}
.wrap{max-width:920px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.num{font-variant-numeric:tabular-nums}svg{vertical-align:middle}
.back{display:inline-flex;align-items:center;gap:7px;min-height:40px;font-size:14px;font-weight:600;color:var(--teal-ink)}
.hero{border-radius:var(--rcard);padding:18px 22px;color:#fff;background:radial-gradient(circle at 88% 12%,rgba(218,168,72,.24) 0%,rgba(218,168,72,0) 26%),radial-gradient(circle at 12% 0%,rgba(76,201,240,.2) 0%,rgba(76,201,240,0) 30%),linear-gradient(135deg,#061922 0%,#0b3642 48%,#0f5c6d 80%,#041018 100%)}
.hero .eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.6)}
.hero h1{font-size:22px;font-weight:600;margin-top:4px}
.hero .desc{font-size:13px;color:rgba(255,255,255,.74);margin-top:6px}
.seclabel{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:6px 2px 2px}
.seclabel .l{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:600;color:var(--teal-ink);letter-spacing:.01em}
.seclabel .l::before{content:"";width:3px;height:16px;border-radius:2px;background:var(--teal);flex:0 0 auto}
.seclabel .add{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:40px;background:var(--teal-ink);color:#fff;font-weight:700;font-size:13px;border-radius:var(--rctrl);padding:9px 16px;flex:0 0 auto}
.tcard{background:#fff;border:1px solid var(--cardline);border-radius:16px;box-shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px -16px rgba(11,54,66,.18);padding:20px 22px;display:flex;gap:14px}
.tcard .avatar{flex:0 0 auto;width:42px;height:42px;border-radius:999px;background:var(--teal-ink);color:#fff;font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center}
.tcard .body{flex:1;min-width:0}
.t-title{font-size:17px;font-weight:600;color:var(--ink)}
.t-excerpt{font-size:13.5px;color:var(--sub);margin-top:4px}
.t-meta{display:flex;align-items:center;gap:6px 12px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:var(--faint);font-weight:600}
.t-meta>span{white-space:nowrap}
.t-meta .author{color:var(--ink)}
.t-meta .role{font-size:11px;font-weight:700;border-radius:999px;padding:2px 9px;background:var(--tint);color:var(--teal-ink)}
.t-meta .reply{display:inline-flex;align-items:center;gap:5px}
.ico{color:var(--teal)}
@media(max-width:560px){
  body{padding:12px}.wrap{gap:10px}
  .hero{padding:16px}.hero h1{font-size:20px}
  .seclabel{flex-direction:column;align-items:stretch;gap:8px}
  .seclabel .add{width:100%}
  .tcard{padding:16px}.tcard .avatar{width:38px;height:38px;font-size:15px}
}
</style></head><body><div class="wrap">
