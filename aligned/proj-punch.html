<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><style>
:root{--ink:#16212b;--sub:#475569;--faint:#6b7280;--teal:#0f5c6d;--teal-ink:#0b3642;--cardline:rgba(11,54,66,.15);--rcard:14px;--rctrl:10px;--tint:#ecf6f6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans TC",system-ui,sans-serif;background:#e3e9ee;color:var(--ink);font-size:14px;line-height:1.5;padding:16px}
.wrap{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.num{font-variant-numeric:tabular-nums}svg{vertical-align:middle}
.hero{border-radius:var(--rcard);padding:18px 22px;color:#fff;background:radial-gradient(circle at 88% 12%,rgba(218,168,72,.24) 0%,rgba(218,168,72,0) 26%),radial-gradient(circle at 12% 0%,rgba(76,201,240,.2) 0%,rgba(76,201,240,0) 30%),linear-gradient(135deg,#061922 0%,#0b3642 48%,#0f5c6d 80%,#041018 100%)}
.hero .back{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:rgba(255,255,255,.78);margin-bottom:12px}
.hero .eyebrow{font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.6)}
.hero h1{font-size:22px;font-weight:600;margin-top:4px}
.hero .desc{font-size:13px;color:rgba(255,255,255,.74);margin-top:8px;max-width:680px}
.card{background:#fff;border:1px solid var(--cardline);border-radius:16px;box-shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px -16px rgba(11,54,66,.18);padding:20px 22px}
.sectitle{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:600;color:var(--teal-ink);margin-bottom:16px;letter-spacing:.01em}
.sectitle::before{content:"";width:3px;height:16px;border-radius:2px;background:var(--teal);flex:0 0 auto}
.sectitle svg{color:var(--teal)}
.drawsel{display:inline-flex;align-items:center;gap:8px;background:#fff;color:var(--teal-ink);font-size:13px;font-weight:600;border:1px solid #e2e8ed;border-radius:9px;padding:9px 13px;min-height:40px}
.drawsel .di{color:var(--teal);flex:0 0 auto}
.drawsel .dt{white-space:nowrap}
.plan{position:relative;margin-top:12px;border:1px dashed var(--cardline);border-radius:12px;background:#f7f8fa;min-height:360px;display:flex;align-items:center;justify-content:center}
.plan .ph{display:flex;flex-direction:column;align-items:center;gap:8px;font-size:12px;color:#94a3b8}
.plan .ph svg{color:#cbd5d1}
.planhint{margin-top:10px;font-size:12px;color:var(--faint)}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
.filt{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:var(--sub);background:#fff;border:1px solid #e2e8ed;border-radius:999px;padding:8px 13px;min-height:36px;white-space:nowrap}
.filt b{font-weight:700;font-size:12px;color:var(--faint)}
.filt.on{background:var(--teal-ink);color:#fff;border-color:var(--teal-ink)}
.filt.on b{color:rgba(255,255,255,.78)}
.empty{margin-top:14px;border:1px dashed var(--cardline);border-radius:12px;background:#fff;padding:42px 16px;text-align:center;font-size:13px;color:var(--faint)}
.layout{display:grid;grid-template-columns:1.55fr 1fr;gap:10px;align-items:start}
@media(max-width:560px){
  body{padding:12px}.wrap{gap:10px}
  .hero{padding:16px}.hero h1{font-size:20px}
  .layout{grid-template-columns:1fr}
  .drawsel{width:100%;justify-content:flex-start}
  .drawsel .dt{white-space:normal}
  .plan{min-height:240px}
  .filters{gap:6px}.filt{padding:8px 11px;font-size:12px}
}
</style></head><body><div class="wrap">

  <div class="hero">
    <a class="back"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>返回</a>
    <div class="eyebrow">內部驗收</div>
    <h1>釘點缺失</h1>
    <div class="desc">在平面圖上釘點記錄缺失，指派工班改善，PM / 工程總監 / 督導 驗收後關閉</div>
  </div>

  <div class="layout">

    <div class="card">
      <div class="sectitle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>平面圖釘點</div>
      <span class="drawsel"><svg class="di" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg><span class="dt">細部圖 v1 · 木作立面圖與尺寸確認.pdf</span></span>
      <div class="plan"><div class="ph"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg></div></div>
      <div class="planhint">在平面圖上點擊任意位置建立新釘點</div>
    </div>

    <div class="card">
      <div class="sectitle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>缺失狀態</div>
      <div class="filters">
        <span class="filt on">全部 <b class="num">(0)</b></span>
        <span class="filt">新建 <b class="num">(0)</b></span>
        <span class="filt">處理中 <b class="num">(0)</b></span>
        <span class="filt">已修 <b class="num">(0)</b></span>
        <span class="filt">驗收通過 <b class="num">(0)</b></span>
        <span class="filt">重開 <b class="num">(0)</b></span>
      </div>
      <div class="empty">沒有符合條件的釘點</div>
    </div>

  </div>

</div></body></html>
